<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- CACHE BUSTING - Prevenir caché agresivo del navegador -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Sanborns - Gift Finder San Valentín</title>
    <link rel="stylesheet" href="styles.css?v=20250129-1730">
</head>
<body>
    <!-- dataLayer para GTM: eventos gift_finder_* (género, categoría, producto, wishlist) -->
    <script>window.dataLayer = window.dataLayer || [];</script>
    <div class="banner-container" id="app">
        <!-- Header -->
        <header class="banner-header">
            <img src="Logo_sanborns_bco.png" alt="Sanborns" class="logo">
            <div class="wishlist-counter" id="wishlistCounter">
                <span class="heart-icon">❤️</span>
                <span class="counter-text"><span id="wishlistCount">0</span> en tu wishlist</span>
            </div>
        </header>

        <!-- Contenido Dinámico -->
        <div id="screen-container" class="fade-in">
            <!-- Las pantallas se renderizan aquí -->
        </div>

        <!-- Mini productos decorativos -->
        <div class="floating-products">
            <span class="product-icon">💝</span>
            <span class="product-icon">💖</span>
            <span class="product-icon">💕</span>
        </div>
    </div>

    <!-- Modal de envío de Wishlist -->
    <div class="email-modal" id="emailModal">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <button class="modal-close" id="modalClose" aria-label="Cerrar">×</button>
            <div class="modal-header">
                <h2>💌 Envía tu Wishlist</h2>
            </div>
            <form class="modal-form" id="wishlistForm">
                <div class="form-group">
                    <label for="emailPareja">Email de destino *</label>
                    <input type="email" id="emailPareja" name="emailPareja" required placeholder="email@ejemplo.com" class="form-input" />
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn-send" id="btnEnviar">✉️ Enviar Wishlist</button>
                    <button type="button" class="btn-cancel" id="btnCancelar">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="products-data.js?v=20250129-1730"></script>
    <script src="product-images.js?v=20250129-1730"></script>
    <script src="products-catalog.js?v=20250129-1730"></script>
    <script src="main.js?v=20250129-1730"></script>
    
    <!-- Cache Busting Script - Limpiar storage al cargar -->
    <script>
        (function() {
            // Limpiar storage del navegador para forzar actualización
            if (window.localStorage) {
                localStorage.clear();
            }
            if (window.sessionStorage) {
                sessionStorage.clear();
            }
            console.log('✅ Cache limpiado - Versión: 20250129-1730');
        })();
    </script>
</body>
</html>
