<html lang="es-MX">

    <style>
:root {
    --pink-light: #FFB6C1;
    --pink-medium: #FFC0CB;
    --pink-fuchsia: #FF1493;
    --pink-deep: #DC143C;
    --white: #FFFFFF;
    --text-dark: #333333;
    --gradient-bg: linear-gradient(180deg, #FFB6C1 0%, #FFC0CB 50%, #FFB6C1 100%);
    --gradient-button: linear-gradient(135deg, #FF1493 0%, #FF69B4 100%);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(180deg, #FFB6C1 0%, #FFC0CB 50%, #FFB6C1 100%);
}
#banner-container, .banner-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: linear-gradient(180deg, #FFB6C1 0%, #FFC0CB 50%, #FFB6C1 100%);
    padding: 15px;
    display: flex;
    flex-direction: column;
}
.content-wrapper {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
}
.banner-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    position: relative;
    z-index: 10;
    pointer-events: auto;
}
.logo { width: 80px; }
.wishlist-counter {
    background: white;
    padding: 4px 8px;
    border-radius: 15px;
    font-size: 10px;
    color: #FF1493;
    font-weight: bold;
}
#screen-container {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 10;
    pointer-events: auto;
}
.screen-title {
    color: #DC143C;
    font-size: 18px;
    text-align: center;
    margin-bottom: 20px;
}
.welcome-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    height: 100%;
    padding-top: 20px;
}
.ai-character {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
    z-index: 10;
}
.animated-heart-img {
    width: 180px;
    height: auto;
    filter: drop-shadow(0 0 5px #FF1493) drop-shadow(0 0 10px rgba(255, 20, 147, 0.6));
    animation: floatHeart 3s ease-in-out infinite;
}
@keyframes floatHeart {
    0%, 100% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-10px) scale(1.05); }
}
.chat-bubble {
    background: white;
    border-radius: 20px;
    padding: 20px;
    width: 100%;
    position: relative;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    margin-bottom: 30px;
    text-align: center;
}
.chat-bubble-tail {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-bottom: 10px solid white;
}
.chat-title {
    color: #003D7A;
    font-size: 17px;
    font-weight: 800;
    margin-bottom: 8px;
    line-height: 1.3;
}
.chat-subtitle { color: #666; font-size: 14px; font-weight: 300; }
.gender-selection { width: 100%; display: flex; flex-direction: column; gap: 10px; }
.gender-btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: white;
    color: #DC143C;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    transition: transform 0.2s;
}
.gender-btn:hover { transform: scale(1.02); }
.category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; overflow-y: auto; }
.category-btn {
    padding: 15px 5px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.8);
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    text-align: center;
    position: relative;
    z-index: 10;
    pointer-events: auto;
}
.products-scroll {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 5px;
    padding-bottom: 32px;
}
.product-card {
    background: white;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 10px;
    display: flex;
    gap: 10px;
    position: relative;
    z-index: 10;
    pointer-events: auto;
    transition: all 0.3s ease;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}
.product-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 20, 147, 0.2);
    background: linear-gradient(135deg, #ffffff 0%, #fff5f8 100%);
}
.product-card:active { transform: translateY(0px); box-shadow: 0 3px 12px rgba(255, 20, 147, 0.15); }
.product-img, .product-card img, .product-image {
    width: 100%;
    max-width: 100px;
    height: 100px;
    object-fit: contain;
    background: #fff;
    border-radius: 5px;
    flex-shrink: 0;
}
.product-info { flex: 1; }
.product-name { font-size: 12px; font-weight: bold; margin-bottom: 4px; }
.product-price { color: #DC143C; font-size: 13px; font-weight: bold; }
.add-btn {
    background: #FF1493;
    color: white;
    border: none;
    border-radius: 5px;
    padding: 5px;
    font-size: 10px;
    cursor: pointer;
    margin-top: 5px;
    position: relative;
    z-index: 10;
    pointer-events: auto;
}
.back-btn {
    background: rgba(255, 255, 255, 0.9);
    border: 2px solid #FF1493;
    color: #FF1493;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 20px;
    margin-bottom: 15px;
    text-align: left;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.3s ease;
    box-shadow: 0 2px 8px rgba(255, 20, 147, 0.15);
    position: relative;
    z-index: 10;
    pointer-events: auto;
}
.back-btn:hover { background: #FF1493; color: white; transform: translateX(-3px); }
.btn-main {
    background: linear-gradient(135deg, #FF1493 0%, #FF69B4 100%);
    color: white;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    margin-top: 10px;
    cursor: pointer;
    position: relative;
    z-index: 10;
    pointer-events: auto;
}
.fade-in { animation: fadeIn 0.3s ease-in; }
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
.floating-products {
    position: absolute;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: space-around;
    opacity: 0.3;
    pointer-events: none; /* clics pasan al botón ENVIAR WISHLIST debajo */
}
.email-modal, .modal-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 9999;
}
.email-modal { display: none; align-items: center; justify-content: center; }
.email-modal.active { display: flex; }
.modal-overlay { background: rgba(0,0,0,0.5); pointer-events: none; }
.modal-content {
    background: white;
    padding: 20px;
    border-radius: 15px;
    width: 90%;
    max-width: 300px;
    position: relative;
    z-index: 10000;
}
.modal-close { position: absolute; top: 10px; right: 10px; border: none; background: none; font-size: 20px; cursor: pointer; }
.form-input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
.btn-send { width: 100%; padding: 10px; background: #FF1493; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
.btn-cancel { width: 100%; padding: 10px; background: #eee; border: none; border-radius: 5px; margin-top: 5px; cursor: pointer; }
    </style>
</head>

function buildProductUrl(product) {
  if (!product || !product.url) return 'https://www.sanborns.com.mx';
  const baseUrl = product.url;
  const params = new URLSearchParams({
    utm_source: 'dv360',
    utm_medium: 'display',
    utm_campaign: 'sanborns_san_valentin_2025',
    utm_content: 'producto_' + (product.id || ''),
    utm_term: 'gift_finder'
  });
  const separator = baseUrl.indexOf('?') !== -1 ? '&' : '?';
  return baseUrl + separator + params.toString();
}
window.buildProductUrl = buildProductUrl;

function validarURLsProductos() {
  const errores = [];
  const warnings = [];
  const products = window.productosDatabase || productosDatabase;
  Object.keys(products).forEach(function (gender) {
    Object.keys(products[gender]).forEach(function (category) {
      (products[gender][category] || []).forEach(function (product) {
        const url = product.url;
        if (!url.startsWith('https://')) {
          errores.push({ id: product.id, nombre: product.nombre, error: 'URL debe comenzar con https://', url: url });
        }
        if (!url.includes('sanborns.com.mx')) {
          errores.push({ id: product.id, nombre: product.nombre, error: 'URL no apunta a sanborns.com.mx', url: url });
        }
      });
    });
  });
  return { errores: errores, warnings: warnings };
}
window.validarURLsProductos = validarURLsProductos;

if (typeof window !== 'undefined') {
  window.addEventListener('DOMContentLoaded', function () {
    validarURLsProductos();
  });
}

// TRACKING - DataLayer + Enabler (DSP/DV360)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function trackEvent(eventName, eventData) {
    var payload = Object.assign({ event: eventName, timestamp: new Date().toISOString() }, eventData || {});
    if (typeof window.dataLayer !== 'undefined') {
        window.dataLayer.push(payload);
    }
    if (typeof Enabler !== 'undefined' && Enabler.counter) {
        Enabler.counter(eventName);
    }
    if (typeof window.zaraz !== 'undefined' && typeof window.zaraz.track === 'function') {
        window.zaraz.track(eventName, eventData || {});
    }
}

    var url = el.getAttribute('data-product-url');
    var id = el.getAttribute('data-product-id');

    if (id != null) {
        trackEvent('product_clicked', {
            product_id: id,
            product_name: name,
            gender: appState.gender,
            category: appState.category
        });
    }
    if (url) {
        // %click_url_unesc% + URL producto = MediaSmart trackea clic y redirige al producto
        var tracker = window.clickTracker || '';
        window.open(tracker + url, '_blank');
    }
};

// Enviar wishlist por mailto - asignado a window INMEDIATAMENTE para que el botón funcione aunque falle código posterior
function sendWishlistByMail() {
    try {
        if (!appState.wishlist || appState.wishlist.length === 0) {
            alert('Por favor selecciona al menos un regalo.');
            return;
        }
        var toEmailEl = document.getElementById('emailPareja');
        var toEmail = (toEmailEl && toEmailEl.value) ? toEmailEl.value.trim() : '';
        if (!toEmail) {
            alert('Escribe el correo de destino.');
            return;
        }
        var items = appState.wishlist.map(function (p) {
            var url = (typeof buildProductUrl === 'function' ? buildProductUrl(p) : (p.url || window.landingPage)) || window.landingPage || (p.url || '');
            var name = (p.nombre || p.name || 'Producto ' + (p.id || '')) || 'Producto';
            var price = (p.precio || 'Ver en Sanborns') || '';
            return { name: name, url: url, price: price };
        });
        var count = items.length;
        var productos = items.map(function (p) { return p.name + ' - ' + p.price + '\n' + p.url; }).join('\n\n');
        var subject = encodeURIComponent('Mi Wishlist Sanborns');
        var body = encodeURIComponent(
            'Hola amor ❤️\n\nEstos son los regalos que me gustarían para San Valentín:\n\n' + productos + '\n\nCon amor,\nTu pareja\n\n---\nCreado con Sanborns Wishlist de San Valentín'
        );
        window.location.href = 'mailto:' + toEmail + '?subject=' + subject + '&body=' + body;
        if (typeof trackEvent === 'function') trackEvent('wishlist_sent', { products_count: count, method: 'mailto' });
        var emailModal = document.getElementById('emailModal');
        if (emailModal) emailModal.classList.remove('active');
    } catch (e) {
        alert('Error al preparar el correo.');
    }
}
window.sendWishlistByMail = sendWishlistByMail;

// Delegación click + touchend para que el botón Enviar funcione en cel
function handleEnviarWishlist(e) {
    var t = e.target;
    var modal = document.getElementById('emailModal');
    var insideModal = modal && (t === modal || modal.contains(t));
    var isBtn = t.id === 'btnEnviar';
    if (!isBtn && t.nodeType === 1) {
        var p = t.parentNode;
        while (p && p !== document.body) {
            if (p.id === 'btnEnviar') { isBtn = true; break; }
            p = p.parentNode;
        }
    }
    if (isBtn) {
        e.preventDefault();
        e.stopPropagation();
        if (typeof window.sendWishlistByMail === 'function') {
            window.sendWishlistByMail();
        }
    }
}
if (typeof document !== 'undefined') {
    document.addEventListener('click', handleEnviarWishlist, true);
    document.addEventListener('touchend', handleEnviarWishlist, true);
}

    var map = LEGACY_FALLBACK_MAP && LEGACY_FALLBACK_MAP[gender];
    return (map && map[dcoCategoryId]) || dcoCategoryId;

function getProductsFallback(gender, dcoCategoryId) {
    if (!window.productosDatabase || !window.productosDatabase[gender]) return [];
    var legacyKey = getLegacyCategoryKey(gender, dcoCategoryId);
    var list = window.productosDatabase[gender][legacyKey];
    if (Array.isArray(list) && list.length > 0) return list;
    var firstKey = Object.keys(window.productosDatabase[gender])[0];
    return window.productosDatabase[gender][firstKey] || [];
}

function renderCategories(container) {
    const cats = CATEGORIES[appState.gender];
    const title = appState.gender === 'mujer' ? 'Regalo para Mujer 👩' : 'Regalo para Hombre 👨';
    
    container.innerHTML = `
        <button class="back-btn" onclick="goBack()">
            <span style="font-size: 18px; font-weight: bold;">←</span>
            <span>Volver</span>
        </button>
        <h2 class="screen-title">${title}</h2>
        <p style="text-align: center; margin-bottom: 15px; font-size: 14px;">¿Qué le gustaría?</p>
        <div class="category-grid">
            ${cats.map(cat => `
                <button class="category-btn" onclick="selectCategory('${cat.id}')">
                    <div style="font-size: 24px; margin-bottom: 5px;">${cat.icon}</div>
                    ${cat.name}
                </button>
            `).join('')}
        </div>
    `;
}

function renderProducts(container) {
    const gender = appState.gender;
    const category = appState.category;
    const catConfig = CATEGORIES[gender] && CATEGORIES[gender].find(function (c) { return c.id === category; });
    const matchCategories = (catConfig && catConfig.matchCategories) ? catConfig.matchCategories : [];

    var products = [];
    var catalog = window.PRODUCTS_CATALOG;
    if (Array.isArray(catalog) && catalog.length > 0 && matchCategories.length > 0) {
        products = catalog.filter(function (p) {
            return matchCategories.indexOf(p.category) !== -1 &&
                (p.gender === gender || p.gender === 'ambos');
        });
    }
    // Fallback SOLO cuando el catálogo no devolvió productos (nunca mezclar catalog + productosDatabase).
    if (!Array.isArray(products) || products.length === 0) {
        products = getProductsFallback(gender, category);
    }

    if (!Array.isArray(products) || products.length === 0) {
        /* DCO: sin productos para esta combinación género/categoría */
    }
    const catName = catConfig ? catConfig.name : category;

    const isFromCatalog = Array.isArray(catalog) && catalog.length > 0 && products.length > 0 && products[0].hasOwnProperty('gender');

    container.innerHTML = `
        <button class="back-btn" onclick="goBack()">
            <span style="font-size: 18px; font-weight: bold;">←</span>
            <span>Volver</span>
        </button>
        <h2 class="screen-title" style="font-size: 16px;">${catName}</h2>
        <p style="text-align: center; margin-bottom: 10px; font-size: 12px;">✨ Encontramos ofertas para ti</p>
        <div class="products-scroll">
            ${products.map(function (p) {
                var pid = isFromCatalog ? String(p.id) : p.id;
                var isAdded = appState.wishlist.some(function (item) { return String(item.id) === String(pid); });
                var productUrl = typeof buildProductUrl === 'function' ? buildProductUrl(p) : (p.url || '#');
                var displayName = (isFromCatalog ? (p.name || 'Producto ' + p.id) : (p.nombre || '')) || '';
                /* Catálogo: product.name viene del JSON generado (Moda = MODA_NAMES; Big Ticket = slug URL). */
                var imgSrc = isFromCatalog
                    ? (p.imagePath && p.imagePath.indexOf('images/') !== -1 ? p.imagePath : (p.img && p.img.startsWith('http') ? p.img : 'https://images.unsplash.com/photo-1541643600914-78b084683601?w=400&h=400&fit=crop&q=80'))
                    : ((p.img && String(p.img).trim()) ? p.img : 'https://images.unsplash.com/photo-1541643600914-78b084683601?w=400&h=400&fit=crop&q=80');
                var price = isFromCatalog ? (p.precio || 'Ver en Sanborns') : (p.precio || '');
                return (
                    '<div class="product-card' + (isAdded ? ' selected' : '') + '" role="button" style="cursor: pointer; display: block;" data-product-id="' + String(pid).replace(/"/g, '&quot;') + '" data-product-name="' + (displayName + '').replace(/"/g, '&quot;') + '" data-product-url="' + (productUrl + '').replace(/"/g, '&quot;') + '" onclick="handleProductClick(this)">' +
                    '<img src="' + (imgSrc + '').replace(/"/g, '&quot;') + '" class="product-img" alt="' + (displayName + '').replace(/"/g, '&quot;') + '" loading="lazy" onerror="this.src=\'https://images.unsplash.com/photo-1541643600914-78b084683601?w=400&h=400&fit=crop&q=80\'">' +
                    '<div class="product-info">' +
                    '<div class="product-name">' + displayName + '</div>' +
                    '<div class="product-price">' + price + '</div>' +
                    '<button type="button" class="add-btn" data-product-id="' + String(pid).replace(/"/g, '&quot;') + '" data-wishlist-btn>' + (isAdded ? '❤️ Quitar' : '🤍 Agregar') + '</button>' +
                    '</div></div>'
                );
            }).join('')}
        </div>
        <button type="button" class="btn-main" id="send-wishlist-btn" style="z-index: 10; pointer-events: auto; position: relative;">💌 ENVIAR WISHLIST POR EMAIL</button>
        <div id="mailto-link-wrap" style="display:none; margin-top:8px; font-size:14px; text-align:center;"></div>
    `;
    // Delegated: botón wishlist (no seguir link)
    container.querySelectorAll('[data-wishlist-btn]').forEach(function (btn) {
        btn.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            var id = this.getAttribute('data-product-id');
            var product = products.find(function (pr) { return String(pr.id) === String(id); });
            if (product) toggleWishlist(product);
        });
    });
    // Listener DIRECTO en el botón (Chrome desktop exige gesto de usuario; delegación lo pierde)
    var sendBtn = container.querySelector('#send-wishlist-btn');
    if (sendBtn) {
        sendBtn.addEventListener('click', function (e) {
            var selectedCards = document.querySelectorAll('.product-card.selected');
            if (selectedCards.length === 0) {
                e.preventDefault();
                alert('Por favor, selecciona al menos un producto para tu lista.');
                return;
            }
            var productNames = Array.from(selectedCards).map(function (card) {
                var nameEl = card.querySelector('.product-name');
                return nameEl ? nameEl.innerText : 'Producto';
            });
            var subject = encodeURIComponent('Mi Wishlist de San Valentín - Sanborns');
            var body = encodeURIComponent('¡Hola! Estos son los regalos que me encantaron:\n\n' + productNames.join('\n') + '\n\nCheca el catálogo aquí: ' + window.location.href);
            var mailtoUrl = 'mailto:?subject=' + subject + '&body=' + body;
            e.preventDefault();
            e.stopPropagation();
            var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window);
            if (isMobile) {
                try {
                    var anchor = document.getElementById('mailto-anchor');
                    if (!anchor) {
                        anchor = document.createElement('a');
                        anchor.id = 'mailto-anchor';
                        anchor.style.display = 'none';
                        document.body.appendChild(anchor);
                    }
                    anchor.href = mailtoUrl;
                    anchor.click();
                } catch (err) {
                    window.location.href = mailtoUrl;
                }
            } else {
                var wrap = document.getElementById('mailto-link-wrap');
                if (!wrap) {
                    wrap = document.createElement('div');
                    wrap.id = 'mailto-link-wrap';
                    wrap.style.cssText = 'margin-top:10px;padding:10px;background:rgba(255,255,255,0.95);border-radius:8px;font-size:14px;';
                    sendBtn.parentNode.appendChild(wrap);
                }
                wrap.innerHTML = 'Haz clic para abrir tu correo: <a href="' + mailtoUrl.replace(/"/g, '&quot;') + '" class="btn-main" style="display:inline-block;margin-top:6px;">Abrir en correo</a>';
                wrap.style.display = 'block';
            }
            if (typeof window.dataLayer !== 'undefined') {
                window.dataLayer.push({ event: 'wishlist_sent', products_count: selectedCards.length });
            }
        });
    }
    /* Clic en producto: handleProductClick (onclick) hace track + window.open - QA CM360/DV360 */
}

window.selectGender = (gender) => {
    appState.gender = gender;
    appState.screen = 'categorias';
    trackEvent('gender_selected', { gender: gender });
    render();
};

window.selectCategory = (category) => {
    var gender = appState.gender;
    var catConfig = CATEGORIES[gender] && CATEGORIES[gender].find(function (c) { return c.id === category; });
    var useCatalog = Array.isArray(window.PRODUCTS_CATALOG) && window.PRODUCTS_CATALOG.length > 0 && catConfig && catConfig.matchCategories;
    var productsRef = useCatalog
        ? window.PRODUCTS_CATALOG.filter(function (p) {
            return catConfig.matchCategories.indexOf(p.category) !== -1 && (p.gender === gender || p.gender === 'ambos');
          })
        : getProductsFallback(gender, category);
    /* Zero logs - QA CM360/DV360 */
    appState.category = category;
    appState.screen = 'productos';
    trackEvent('category_selected', { gender: gender, category: category });
    render();
};

window.goBack = () => {
    if (appState.screen === 'productos') {
        appState.screen = 'categorias';
    } else if (appState.screen === 'categorias') {
        appState.screen = 'inicio';
    }
    render();
};

window.toggleWishlist = (product) => {
    const index = appState.wishlist.findIndex(item => item.id === product.id);
    if (index === -1) {
        appState.wishlist.push(product);
        trackEvent('product_added_to_wishlist', {
            product_id: String(product.id),
            product_name: product.nombre || '',
            gender: appState.gender,
            category: appState.category,
            wishlist_count: appState.wishlist.length
        });
    } else {
        appState.wishlist.splice(index, 1);
    }
    updateWishlistCounter();
    render();
};

function updateWishlistCounter() {
    const counter = document.getElementById('wishlistCount');
    if (counter) counter.textContent = appState.wishlist.length;
}

// Modal Logic
window.openEmailModal = () => {
    if (appState.wishlist.length === 0) {
        alert('Agrega al menos un producto a tu wishlist primero ❤️');
        return;
    }
    trackEvent('wishlist_modal_opened', { wishlist_count: appState.wishlist.length });
    document.getElementById('emailModal').classList.add('active');
};

function attachModalAndWishlistSend() {
    var emailModal = document.getElementById('emailModal');
    var modalClose = document.getElementById('modalClose');
    var btnCancelar = document.getElementById('btnCancelar');
    var wishlistForm = document.getElementById('wishlistForm');
    if (modalClose && emailModal) modalClose.onclick = function () {
        if (typeof exitClickHandler === 'function') exitClickHandler('Modal Close');
        emailModal.classList.remove('active');
    };
    if (btnCancelar && emailModal) btnCancelar.onclick = function () {
        if (typeof exitClickHandler === 'function') exitClickHandler('Cancel');
        emailModal.classList.remove('active');
    };
    if (wishlistForm) {
        wishlistForm.onsubmit = function (e) {
            e.preventDefault();
            sendWishlistByMail();
        };
    }
    var btnEnviar = document.getElementById('btnEnviar');
    if (btnEnviar) {
        btnEnviar.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            sendWishlistByMail();
        });
    }
}

// MediaSmart: abrir producto con click tracker
window.openProductPage = (url) => {
    if (!url) {
        window.open(window.clickTag || window.landingPage, '_blank');
        return;
    }
    var tracker = window.clickTracker || '';
    window.open(tracker + url, '_blank');
};

// Start
document.addEventListener('DOMContentLoaded', function () {
    trackEvent('banner_loaded', {});
    attachModalAndWishlistSend();
    render();
});


    </script>
</body>
</html>
