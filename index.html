<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanborns - Día de las Madres | ¡Mamá se merece lo mejor!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream-pink: #fce4ec;
            --cream-center: #fff5f8;
            --fuchsia-mid: #e91e63;
            --fuchsia-deep: #c2185b;
            --fuchsia-edge: #880e4f;
            --gold: #d4af37;
            --gold-light: #f4e4a6;
            --gold-shadow: rgba(180, 140, 50, 0.5);
            --white: #ffffff;
            --pearl-bg: rgba(255, 255, 255, 0.92);
            --font-elegant: 'Playfair Display', Georgia, serif;
            --font-ui: 'Poppins', -apple-system, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            min-height: 100%;
            font-family: var(--font-ui);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .campaign-page {
            min-height: 100vh;
            position: relative;
            background: radial-gradient(
                ellipse 120% 100% at 50% 40%,
                var(--cream-center) 0%,
                var(--cream-pink) 25%,
                #f8bbd0 50%,
                #f06292 75%,
                var(--fuchsia-mid) 90%,
                var(--fuchsia-deep) 95%,
                var(--fuchsia-edge) 100%
            );
            display: flex;
            flex-direction: column;
            padding: clamp(16px, 5vw, 24px);
            padding-bottom: max(env(safe-area-inset-bottom), 24px);
        }
        .petals-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .petal {
            position: absolute;
            border-radius: 50% 0 50% 50%;
            opacity: 0.5;
            animation: floatPetal 12s ease-in-out infinite;
        }
        .petal--1 { width: 14px; height: 14px; background: #f8bbd0; top: 12%; left: 8%; animation-delay: 0s; transform: rotate(20deg); }
        .petal--2 { width: 18px; height: 18px; background: #f48fb1; top: 25%; right: 10%; animation-delay: -3s; transform: rotate(-15deg); }
        .petal--3 { width: 12px; height: 12px; background: #fce4ec; top: 45%; left: 5%; animation-delay: -6s; transform: rotate(40deg); }
        .petal--4 { width: 16px; height: 16px; background: #f4e4a6; top: 60%; right: 8%; animation-delay: -2s; transform: rotate(-25deg); }
        .petal--5 { width: 10px; height: 10px; background: #f8bbd0; top: 75%; left: 15%; animation-delay: -8s; transform: rotate(10deg); }
        .petal--6 { width: 14px; height: 14px; background: #f48fb1; top: 35%; right: 18%; animation-delay: -4s; transform: rotate(35deg); }
        .petal--7 { width: 11px; height: 11px; background: #fce4ec; bottom: 25%; left: 10%; animation-delay: -7s; transform: rotate(-10deg); }
        .petal--8 { width: 15px; height: 15px; background: #f4e4a6; bottom: 40%; right: 12%; animation-delay: -1s; transform: rotate(5deg); }
        /* --- LEGO floral: solo CSS, sin imágenes ni SVG --- */
        :root {
            --lego-pink: #FF69B4;
            --lego-deeppink: #FF1493;
            --lego-purple: #9370DB;
            --lego-blueviolet: #8A2BE2;
            --lego-gold: #FFD700;
            --lego-green: #32CD32;
            --lego-green-dark: #228B22;
            --lego-highlight: rgba(255,255,255,0.6);
            --lego-shadow: rgba(0,0,0,0.25);
            --lego-edge: rgba(0,0,0,0.15);
        }
        .lego-floral-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: visible;
            z-index: 1;
        }
        .lego-floral-layer .flower-top-left,
        .lego-floral-layer .flower-top-right,
        .lego-floral-layer .flower-bottom {
            pointer-events: auto;
        }
        .flower-top-left {
            position: absolute;
            top: -2%;
            left: -5%;
            width: min(72%, 260px);
            height: min(38%, 200px);
            z-index: 1;
        }
        .flower-top-right {
            position: absolute;
            top: 0;
            right: -4%;
            width: min(50%, 180px);
            height: min(45%, 220px);
            z-index: 1;
        }
        .flower-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: min(30%, 140px);
            z-index: 1;
        }
        /* Pieza LEGO base: textura plástico + stud (::after) */
        .lego-piece {
            position: absolute;
            border-radius: 50%;
            background-image:
                linear-gradient(145deg, var(--lego-highlight) 0%, transparent 25%),
                linear-gradient(180deg, currentColor 0%, currentColor 70%, var(--lego-shadow) 100%);
            background-color: var(--lego-pink);
            border: 2px solid var(--lego-edge);
            box-shadow:
                inset 2px 2px 4px var(--lego-highlight),
                inset -1px -1px 3px var(--lego-shadow),
                1px 1px 0 rgba(0,0,0,0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .lego-piece::after {
            content: '';
            position: absolute;
            width: 45%;
            height: 45%;
            top: -8%;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, var(--lego-highlight), currentColor 60%, var(--lego-shadow));
            box-shadow:
                0 2px 4px var(--lego-shadow),
                inset 0 1px 0 var(--lego-highlight);
            border: 1px solid var(--lego-edge);
        }
        .lego-piece:hover {
            transform: scale(1.02);
            box-shadow:
                inset 2px 2px 4px var(--lego-highlight),
                inset -1px -1px 3px var(--lego-shadow),
                2px 2px 8px var(--lego-shadow);
        }
        /* Rosa: pétalos circulares + centro amarillo */
        .lego-rose {
            position: absolute;
            top: 15%;
            left: 10%;
            width: 56px;
            height: 56px;
        }
        .lego-rose .lego-petal.lego-piece {
            width: 22px;
            height: 22px;
            color: var(--lego-deeppink);
            background-color: var(--lego-deeppink);
        }
        .lego-rose .lego-petal:nth-child(1) { top: 0; left: 50%; transform: translateX(-50%); }
        .lego-rose .lego-petal:nth-child(2) { top: 18px; left: 0; }
        .lego-rose .lego-petal:nth-child(3) { top: 18px; right: 0; left: auto; }
        .lego-rose .lego-petal:nth-child(4) { bottom: 18px; left: 4px; top: auto; }
        .lego-rose .lego-petal:nth-child(5) { bottom: 18px; right: 4px; left: auto; top: auto; }
        .lego-rose .lego-center.lego-piece {
            width: 14px;
            height: 14px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--lego-gold);
            background-color: var(--lego-gold);
        }
        .lego-rose .lego-center::after {
            width: 50%;
            height: 50%;
            top: -15%;
        }
        /* Segunda rosa */
        .lego-rose-2 {
            top: 8%;
            left: 38%;
            width: 48px;
            height: 48px;
        }
        .lego-rose-2 .lego-petal { width: 18px; height: 18px; color: var(--lego-pink); background-color: var(--lego-pink); }
        .lego-rose-2 .lego-petal:nth-child(1) { top: 0; left: 50%; transform: translateX(-50%); }
        .lego-rose-2 .lego-petal:nth-child(2) { top: 14px; left: 0; }
        .lego-rose-2 .lego-petal:nth-child(3) { top: 14px; right: 0; left: auto; }
        .lego-rose-2 .lego-petal:nth-child(4) { bottom: 14px; left: 2px; top: auto; }
        .lego-rose-2 .lego-petal:nth-child(5) { bottom: 14px; right: 2px; left: auto; top: auto; }
        .lego-rose-2 .lego-center { width: 12px; height: 12px; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--lego-gold); background-color: var(--lego-gold); }
        .lego-rose-2 .lego-center::after { width: 50%; height: 50%; top: -15%; }
        /* Tulipán: pétalos ovalados */
        .lego-tulip {
            position: absolute;
            top: 42%;
            left: 5%;
            width: 44px;
            height: 40px;
        }
        .lego-tulip .lego-petal {
            width: 16px;
            height: 24px;
            border-radius: 50% 50% 45% 45%;
            color: var(--lego-pink);
            background-color: var(--lego-pink);
        }
        .lego-tulip .lego-petal:nth-child(1) { top: 4px; left: 14px; }
        .lego-tulip .lego-petal:nth-child(2) { top: 8px; left: 0; }
        .lego-tulip .lego-petal:nth-child(3) { top: 8px; right: 0; left: auto; }
        .lego-tulip .lego-petal:nth-child(4) { top: 12px; left: 14px; }
        /* Hojas LEGO (verde, forma alargada) */
        .lego-leaf {
            position: absolute;
            width: 28px;
            height: 14px;
            border-radius: 50% 50% 50% 10%;
            color: var(--lego-green-dark);
            background-color: var(--lego-green);
            transform: rotate(var(--leaf-rot, -25deg));
        }
        .lego-leaf::after {
            width: 40%;
            height: 50%;
            top: -20%;
        }
        .flower-top-left .lego-leaf:nth-of-type(1) { bottom: 18%; left: 0; --leaf-rot: -35deg; }
        .flower-top-left .lego-leaf:nth-of-type(2) { bottom: 5%; left: 22%; --leaf-rot: 15deg; }
        .flower-top-left .lego-leaf:nth-of-type(3) { top: 55%; left: 2%; --leaf-rot: -50deg; }
        /* Orquídea: pétalos alargados púrpura */
        .lego-orchid {
            position: absolute;
            top: 12%;
            right: 5%;
            width: 70px;
            height: 90px;
        }
        .lego-orchid .lego-petal {
            width: 18px;
            height: 36px;
            border-radius: 45% 45% 50% 50%;
            color: var(--lego-purple);
            background-color: var(--lego-purple);
        }
        .lego-orchid .lego-petal:nth-child(1) { top: 0; left: 26px; }
        .lego-orchid .lego-petal:nth-child(2) { top: 18px; left: 0; transform: rotate(-25deg); transform-origin: bottom center; }
        .lego-orchid .lego-petal:nth-child(3) { top: 18px; right: 0; left: auto; transform: rotate(25deg); transform-origin: bottom center; }
        .lego-orchid .lego-petal:nth-child(4) { bottom: 20px; left: 8px; top: auto; transform: rotate(-15deg); transform-origin: top center; }
        .lego-orchid .lego-petal:nth-child(5) { bottom: 20px; right: 8px; left: auto; top: auto; transform: rotate(15deg); transform-origin: top center; }
        .lego-orchid .lego-center {
            width: 16px;
            height: 16px;
            top: 38px;
            left: 27px;
            color: var(--lego-blueviolet);
            background-color: var(--lego-blueviolet);
        }
        .flower-top-right .lego-leaf:nth-of-type(1) { bottom: 25%; right: 15%; left: auto; --leaf-rot: 40deg; }
        .flower-top-right .lego-leaf:nth-of-type(2) { top: 60%; right: 0; left: auto; --leaf-rot: -20deg; }
        /* Base inferior: follaje y flores pequeñas */
        .lego-stem {
            position: absolute;
            width: 8px;
            height: 50px;
            border-radius: 2px;
            bottom: 0;
            color: var(--lego-green-dark);
            background: linear-gradient(90deg, var(--lego-shadow) 0%, var(--lego-green) 20%, var(--lego-green) 80%, var(--lego-green-dark) 100%);
            border: 1px solid var(--lego-edge);
            box-shadow: inset 1px 0 0 var(--lego-highlight);
        }
        .lego-stem::after {
            width: 60%;
            height: 30%;
            top: -5%;
            left: 50%;
            transform: translateX(-50%);
        }
        .flower-bottom .lego-stem:nth-child(1) { left: 8%; height: 44px; transform: rotate(5deg); }
        .flower-bottom .lego-stem:nth-child(2) { left: 28%; height: 52px; transform: rotate(-3deg); }
        .flower-bottom .lego-stem:nth-child(3) { right: 25%; left: auto; height: 48px; transform: rotate(4deg); }
        .flower-bottom .lego-leaf { width: 24px; height: 12px; }
        .flower-bottom .lego-leaf:nth-child(4) { bottom: 22px; left: 5%; --leaf-rot: -20deg; }
        .flower-bottom .lego-leaf:nth-child(5) { bottom: 28px; left: 22%; --leaf-rot: 25deg; }
        .flower-bottom .lego-leaf:nth-child(6) { bottom: 24px; right: 28%; left: auto; --leaf-rot: -15deg; }
        .flower-bottom .lego-leaf:nth-child(7) { bottom: 30px; right: 8%; left: auto; --leaf-rot: 30deg; }
        /* Flores pequeñas en la base */
        .lego-flower-small {
            position: absolute;
            width: 32px;
            height: 32px;
            bottom: 38px;
        }
        .lego-flower-small .lego-petal {
            width: 12px;
            height: 12px;
            color: var(--lego-deeppink);
            background-color: var(--lego-deeppink);
        }
        .lego-flower-small .lego-petal:nth-child(1) { top: 0; left: 10px; }
        .lego-flower-small .lego-petal:nth-child(2) { top: 10px; left: 0; }
        .lego-flower-small .lego-petal:nth-child(3) { top: 10px; right: 0; left: auto; }
        .lego-flower-small .lego-petal:nth-child(4) { bottom: 10px; left: 6px; top: auto; }
        .lego-flower-small .lego-petal:nth-child(5) { bottom: 10px; right: 6px; left: auto; top: auto; }
        .lego-flower-small .lego-center { width: 8px; height: 8px; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--lego-gold); background-color: var(--lego-gold); }
        .lego-flower-small .lego-center::after { width: 55%; height: 55%; top: -25%; }
        .lego-flower-small.f1 { left: 12%; }
        .lego-flower-small.f2 { left: 48%; }
        .lego-flower-small.f3 { right: 12%; left: auto; }
        @keyframes floatPetal {
            0%, 100% { transform: translate(0, 0) rotate(var(--r, 0deg)); opacity: 0.5; }
            25% { transform: translate(8px, -15px) rotate(calc(var(--r, 0deg) + 10deg)); opacity: 0.7; }
            50% { transform: translate(-5px, -8px) rotate(calc(var(--r, 0deg) - 5deg)); opacity: 0.5; }
            75% { transform: translate(10px, 5px) rotate(calc(var(--r, 0deg) + 15deg)); opacity: 0.6; }
        }
        .campaign-content {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            max-width: 480px;
            margin: 0 auto;
        }
        .campaign-logo {
            width: clamp(70px, 22vw, 100px);
            height: auto;
            margin-bottom: clamp(20px, 5vw, 32px);
            display: block;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15));
        }
        /* Título como en guía: fucsia fuerte, contorno dorado, fondo más claro detrás. */
        .campaign-title-wrap {
            margin-bottom: clamp(12px, 3vw, 20px);
            padding: clamp(14px, 4vw, 22px) clamp(18px, 5vw, 28px);
            background: rgba(255, 255, 255, 0.92);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(136, 14, 79, 0.15), 0 0 0 1px rgba(212, 175, 55, 0.35);
            display: inline-block;
            max-width: 96%;
        }
        .campaign-title {
            font-family: var(--font-elegant);
            font-weight: 700;
            font-size: clamp(1.8rem, 6.2vw, 2.75rem);
            line-height: 1.2;
            padding: 0 4px;
            color: var(--fuchsia-deep);
            -webkit-text-fill-color: var(--fuchsia-deep);
            text-shadow:
                0 0 2px rgba(255,255,255,1),
                0 0 6px var(--gold-light),
                3px 3px 0 var(--gold),
                -2px -2px 0 var(--gold),
                2px -2px 0 var(--gold),
                -2px 2px 0 var(--gold),
                2px 0 0 var(--gold),
                -2px 0 0 var(--gold),
                0 2px 0 var(--gold),
                0 -2px 0 var(--gold),
                0 3px 12px var(--gold-shadow),
                0 4px 14px rgba(136, 14, 79, 0.4);
        }
        @supports not (background-clip: text) {
            .campaign-title { color: var(--fuchsia-deep); }
        }
        .campaign-subtitle {
            font-family: var(--font-ui);
            font-weight: 600;
            font-size: clamp(0.95rem, 3.2vw, 1.15rem);
            color: var(--fuchsia-edge);
            margin-bottom: clamp(24px, 6vw, 36px);
            padding: 0 12px;
            line-height: 1.35;
        }
        .countdown {
            display: flex;
            gap: clamp(8px, 2.5vw, 14px);
            margin-bottom: clamp(28px, 7vw, 44px);
            flex-wrap: wrap;
            justify-content: center;
        }
        .countdown-box {
            flex: 0 0 auto;
            min-width: clamp(64px, 18vw, 82px);
            padding: clamp(10px, 2.5vw, 14px) clamp(8px, 2vw, 12px);
            background: var(--pearl-bg);
            border-radius: 12px;
            border: 2px solid transparent;
            background-image:
                linear-gradient(var(--pearl-bg), var(--pearl-bg)),
                linear-gradient(135deg, #f4e4a6, #d4af37, #8b6914, #d4af37);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            box-shadow:
                0 4px 14px rgba(136, 14, 79, 0.15),
                inset 0 1px 0 rgba(255,255,255,0.9),
                0 0 0 1px rgba(212,175,55,0.3);
        }
        .countdown-number {
            display: block;
            font-family: var(--font-ui);
            font-weight: 700;
            font-size: clamp(1.75rem, 5vw, 2.25rem);
            line-height: 1.1;
            color: var(--fuchsia-deep);
            letter-spacing: -0.02em;
        }
        .countdown-label {
            font-family: var(--font-ui);
            font-size: clamp(0.6rem, 2vw, 0.75rem);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--fuchsia-edge);
            margin-top: 2px;
        }
        .cta-wrap { width: 100%; max-width: 360px; margin: 0 auto; }
        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: clamp(14px, 4vw, 18px) clamp(20px, 5vw, 28px);
            background: linear-gradient(90deg, var(--fuchsia-deep) 0%, #e91e63 35%, #ff6f00 100%);
            background-size: 200% 100%;
            color: var(--white);
            text-decoration: none;
            font-family: var(--font-ui);
            font-weight: 700;
            font-size: clamp(0.95rem, 2.8vw, 1.1rem);
            text-align: center;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            box-shadow:
                0 6px 20px rgba(194, 24, 91, 0.45),
                0 4px 10px rgba(255, 111, 0, 0.25),
                inset 0 1px 0 rgba(255,255,255,0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-position 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            line-height: 1.3;
        }
        .cta-button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow:
                0 10px 28px rgba(194, 24, 91, 0.5),
                0 6px 16px rgba(255, 111, 0, 0.35);
            background-position: 100% 0;
        }
        .cta-button:active { transform: translateY(-1px); }
        @media (min-width: 480px) {
            .campaign-page { padding: 28px; }
            .countdown { gap: 14px; }
        }
    </style>
</head>
<body>
    <main class="campaign-page" role="main">
        <div class="petals-layer" aria-hidden="true">
            <span class="petal petal--1"></span>
            <span class="petal petal--2"></span>
            <span class="petal petal--3"></span>
            <span class="petal petal--4"></span>
            <span class="petal petal--5"></span>
            <span class="petal petal--6"></span>
            <span class="petal petal--7"></span>
            <span class="petal petal--8"></span>
        </div>

        <!-- Flores estilo LEGO: solo CSS (studs, gradientes, formas geométricas). -->
        <div class="lego-floral-layer" aria-hidden="true">
            <div class="flower-top-left">
                <div class="lego-rose">
                    <span class="lego-piece lego-petal"></span>
                    <span class="lego-piece lego-petal"></span>
                    <span class="lego-piece lego-petal"></span>
                    <span class="lego-piece lego-petal"></span>
                    <span class="lego-piece lego-petal"></span>
                    <span class="lego-piece lego-center"></span>
                </div>
                <div class="lego-rose lego-rose-2">
                    <span class="lego-piece lego-petal"></span>
                    <span class="lego-piece lego-petal"></span>
                    <span class="lego-piece lego-petal"></span>
                    <span class="lego-piece lego-petal"></span>
                    <span class="lego-piece lego-petal"></span>
                    <span class="lego-piece lego-center"></span>
                </div>
                <div class="lego-tulip">
                    <span class="lego-piece lego-petal"></span>
                    <span class="lego-piece lego-petal"></span>
                    <span class="lego-piece lego-petal"></span>
                    <span class="lego-piece lego-petal"></span>
                </div>
                <span class="lego-piece lego-leaf"></span>
                <span class="lego-piece lego-leaf"></span>
                <span class="lego-piece lego-leaf"></span>
            </div>
            <div class="flower-top-right">
                <div class="lego-orchid">
                    <span class="lego-piece lego-petal"></span>
                    <span class="lego-piece lego-petal"></span>
                    <span class="lego-piece lego-petal"></span>
                    <span class="lego-piece lego-petal"></span>
                    <span class="lego-piece lego-petal"></span>
                    <span class="lego-piece lego-center"></span>
                </div>
                <span class="lego-piece lego-leaf"></span>

    <script>
        (function() {
            'use strict';
            var targetDate = new Date();
            targetDate.setMonth(4);
            targetDate.setDate(10);
            targetDate.setHours(23, 59, 59, 999);
            var els = {
                days: document.getElementById('countdown-days'),
                hours: document.getElementById('countdown-hours'),
                mins: document.getElementById('countdown-mins'),
                secs: document.getElementById('countdown-secs')
            };
            function pad2(n) { return (n < 10 ? '0' : '') + n; }
            function updateCountdown() {
                var now = new Date();
                if (now >= targetDate) {
                    els.days.textContent = '00';
                    els.hours.textContent = '00';
                    els.mins.textContent = '00';
                    els.secs.textContent = '00';
                    return;
                }
                var diff = targetDate - now;
                els.days.textContent = pad2(Math.floor(diff / 86400000));
                els.hours.textContent = pad2(Math.floor((diff / 3600000) % 24));
                els.mins.textContent = pad2(Math.floor((diff / 60000) % 60));
                els.secs.textContent = pad2(Math.floor((diff / 1000) % 60));
            }
            updateCountdown();
            setInterval(updateCountdown, 1000);
        })();
    </script>
