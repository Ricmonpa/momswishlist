<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="flowerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6D5F5"/>
      <stop offset="50%" style="stop-color:#B57EDC"/>
      <stop offset="100%" style="stop-color:#8B5FBF"/>
    </linearGradient>
    <radialGradient id="flowerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#B57EDC;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#8B5FBF;stop-opacity:0"/>
    </radialGradient>
    <filter id="flowerGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Aura suave -->
  <g filter="url(#flowerGlowFilter)" transform="translate(150, 100)">
    <circle cx="0" cy="0" r="50" fill="url(#flowerGlow)" opacity="0.5">
      <animate attributeName="r" values="50;55;50" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Flor principal: pķtalos tipo margarita/lavanda -->
    <g fill="url(#flowerGradient)" stroke="#FFF" stroke-width="1.5">
      <ellipse cx="0" cy="-28" rx="12" ry="18" transform="rotate(0 0 0)"/>
      <ellipse cx="0" cy="-28" rx="12" ry="18" transform="rotate(60 0 0)"/>
      <ellipse cx="0" cy="-28" rx="12" ry="18" transform="rotate(120 0 0)"/>
      <ellipse cx="0" cy="-28" rx="12" ry="18" transform="rotate(180 0 0)"/>
      <ellipse cx="0" cy="-28" rx="12" ry="18" transform="rotate(240 0 0)"/>
      <ellipse cx="0" cy="-28" rx="12" ry="18" transform="rotate(300 0 0)"/>
    </g>
    <!-- Centro de la flor -->
    <circle cx="0" cy="0" r="14" fill="#FFFAF0" opacity="0.95">
      <animate attributeName="opacity" values="0.95;0.85;0.95" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="10" fill="#B57EDC"/>
  </g>
  <!-- Flores peque±as decorativas -->
  <g opacity="0.6">
    <circle cx="80" cy="150" r="8" fill="#B57EDC">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="150" r="6" fill="#8B5FBF">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6; 0,0" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
