<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=300, height=600, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="ad.size" content="width=300,height=600">
    <title>Sanborns - Carta a los Reyes Magos</title>
    <script src="https://s0.2mdn.net/ads/studio/Enabler.js"></script>
    <link rel="stylesheet" href="CSS/styles.css">
</head>
<body>
    <div class="banner-container" style="width: 300px; height: 600px; overflow: hidden; position: relative;">
        <!-- Header -->
        <header class="banner-header">
            <img src="assets/Logo_sanborns_bco.png" alt="Sanborns" class="logo">
        </header>

        <!-- Zona de personaje IA -->
        <div class="ai-character">
            <img src="assets/reyes-magos.svg" alt="Los Tres Reyes Magos" class="reyes-magos-img">
        </div>

        <!-- Bocadillo de diálogo -->
        <div class="dialogue-bubble">
            <p class="greeting-text">
                ¡Hola! 👋<br>
                <strong>¿Ya escribiste tu carta a los Reyes Magos?</strong>
            </p>
            <p class="sub-text">
                Dime qué deseas y te ayudo a encontrarlo en tu Sanborns más cercano
            </p>
        </div>

        <!-- CTA Section - Input directo estilo WhatsApp -->
        <div class="cta-section">
            <div class="input-container">
                <input 
                    type="text" 
                    placeholder="Escribe tu deseo..."
                    class="message-input"
                    id="messageInput"
                />
                <button class="action-button" id="actionButton" data-mode="mic">
                    🎤
                </button>
            </div>
            
            <p class="benefits-text">
                🎁 Descuento especial + pickup gratis
            </p>
        </div>

        <!-- Mini productos decorativos -->
        <div class="floating-products">
            <span class="product-icon">🎁</span>
            <span class="product-icon">📱</span>
            <span class="product-icon">🎮</span>
        </div>
    </div>

    <script src="js/voice.js"></script>
    <script src="js/products-data.js"></script>
    <script src="js/dynamic-products.js"></script>
    <script src="js/main.js"></script>
    
    <script>
        var clickTag = "https://www.sanborns.com.mx/";

        function handleBannerClick() {
            if (typeof Enabler !== 'undefined' && Enabler.isInitialized()) {
                Enabler.counter('CTA Click');
                Enabler.exit('clickthrough');
            } else {
                window.open(clickTag, '_blank');
            }
        }

        // Hacer todo el banner clickeable (excepto áreas interactivas)
        document.querySelector('.banner-container').addEventListener('click', function(e) {
            if (!e.target.closest('.input-container') && 
                !e.target.closest('.product-card') &&
                !e.target.closest('.action-button') &&
                !e.target.closest('.product-cta') &&
                !e.target.closest('.view-more-btn')) {
                handleBannerClick();
            }
        });
    </script>
</body>
</html>
